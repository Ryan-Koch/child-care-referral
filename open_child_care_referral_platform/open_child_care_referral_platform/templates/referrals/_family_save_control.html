{% if is_family %}
  {% if children %}
    {% if saved_children_label %}
      <div class="small text-success mb-1">
        <i class="bi bi-check-lg me-1"></i>Saved for {{ saved_children_label }}
      </div>
    {% endif %}
    <form method="post"
          action="{% url 'referrals:family_save_provider' %}"
          class="d-flex gap-2 w-100">
      {% csrf_token %}
      <input type="hidden" name="provider" value="{{ provider.pk }}" />
      <input type="hidden" name="next" value="{{ next_url }}" />
      <label class="visually-hidden" for="save-child-{{ provider.pk }}">Save for which child</label>
      <select id="save-child-{{ provider.pk }}"
              name="child"
              class="form-select form-select-sm">
        {% for child in children %}
          <option value="{{ child.pk }}"
                  {% if child.pk == selected_child_id %}selected{% endif %}>{{ child }}</option>
        {% endfor %}
      </select>
      <button type="submit" class="btn btn-sm btn-primary">Save</button>
    </form>
  {% else %}
    <a href="{% url 'referrals:family_add_child' %}"
       class="btn btn-sm btn-outline-primary">
      <i class="bi bi-plus-lg me-1"></i>Add a child to save
    </a>
  {% endif %}
{% endif %}
